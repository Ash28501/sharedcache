version: '3.8'
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redis-data:/data

  shardcache:
    build: .
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis-data: